name: dbt_pipeline

on:
  push:
    branches:
      - master

jobs:
  run_dbt_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: 2. Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 3. Installer dbt Snowflake
        run: |
          python -m pip install --upgrade pip
          pip install dbt-snowflake

      - name: 4. Vérifier l'installation de dbt
        run: |
          dbt --version

      - name: 5. Installer les packages dbt
        working-directory: ./dbt_transformation
        run: |
          dbt deps --profiles-dir .

      - name: 6. Vérifier la connexion Snowflake
        working-directory: ./dbt_transformation
        env:
          DBT_ENV_SECRET_ACCOUNT: ${{ secrets.DBT_ENV_SECRET_ACCOUNT }}
          DBT_ENV_SECRET_USER: ${{ secrets.DBT_ENV_SECRET_USER }}
          DBT_ENV_SECRET_PASSWORD: ${{ secrets.DBT_ENV_SECRET_PASSWORD }}
        run: |
          dbt debug --target dev --profiles-dir .

      - name: 7. Exécuter les modèles dbt
        working-directory: ./dbt_transformation
        env:
          DBT_ENV_SECRET_ACCOUNT: ${{ secrets.DBT_ENV_SECRET_ACCOUNT }}
          DBT_ENV_SECRET_USER: ${{ secrets.DBT_ENV_SECRET_USER }}
          DBT_ENV_SECRET_PASSWORD: ${{ secrets.DBT_ENV_SECRET_PASSWORD }}
        run: |
          dbt build --target dev --profiles-dir .