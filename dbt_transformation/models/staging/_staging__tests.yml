version: 2

models:
  - name: stg_company
    description: "Données nettoyées des entreprises sources"
    columns:
      - name: company_id
        tests:
          - unique
          - not_null

  - name: stg_job_postings
    description: "Données nettoyées des offres d'emploi"
    columns:
      - name: job_id
        tests:
          - unique
          - not_null
      - name: company_id
        tests:
          - not_null

  - name: stg_skills_jobs
    description: "Table de correspondance entre les compétences et les offres"
    columns:
      - name: job_id
        tests:
          - not_null
      - name: skill_id
        tests:
          - not_null